# Handle multiple potential Railway service names
upstream backend_api {
    # Try slugified name from dashboard
    server back-end:8000 max_fails=3 fail_timeout=30s;
    # Try service name from docker-compose.yml
    server backend:8000 max_fails=3 fail_timeout=30s;
    # Try full internal DNS name
    server back-end.railway.internal:8000 max_fails=3 fail_timeout=30s;
}

server {
    listen 80;

    location / {
        root /usr/share/nginx/html;
        index index.html index.htm;
        try_files $uri $uri/ /index.html;
    }

    # Proxy API requests to the backend
    location /api/ {
        proxy_pass http://backend_api;
        proxy_http_version 1.1;
        
        # Failover logic: if one host fails, try the next
        proxy_next_upstream error timeout invalid_header http_500 http_502 http_503 http_504;
        
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection 'upgrade';
        proxy_set_header Host $host; # Use original host
        proxy_cache_bypass $http_upgrade;
        
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;

        # Standard timeouts
        proxy_connect_timeout 60s;
        proxy_send_timeout 60s;
        proxy_read_timeout 60s;

        # Debug header to see if we reached Nginx
        add_header X-Nginx-Version "v3-upstream-multi" always;
    }

    error_page 500 502 503 504 /50x.html;
    location = /50x.html {
        root /usr/share/nginx/html;
    }
}
