server {
    # This matches the ${PORT} variable in your Dockerfile
    listen ${PORT};

    location / {
        root /usr/share/nginx/html;
        index index.html index.htm;
        # This tells Nginx to let React handle the routing
        try_files $uri $uri/ /index.html;
    }

    # Proxy block removed to stop the "host not found" crash.
    # The React app will talk directly to the Backend URL now.
}