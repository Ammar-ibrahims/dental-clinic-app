server {
    listen 80;

    location / {
        root /usr/share/nginx/html;
        index index.html index.htm;
        try_files $uri $uri/ /index.html;
    }

    # Proxy API requests to the backend
    location /api/ {
        resolver 8.8.8.8 valid=30s;
        
        # We use an environment variable for the backend service domain
        # Example: backend-production.up.railway.app
        set $backend_url "${RAILWAY_BACKEND_URL}";
        
        # Fallback if variable is missing
        if ($backend_url = "") {
            set $backend_url "back-end.railway.internal:8000";
        }

        proxy_pass http://$backend_url;
        proxy_http_version 1.1;
        
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection 'upgrade';
        proxy_set_header Host $backend_url; # Path-based routing needs the correct host header
        proxy_cache_bypass $http_upgrade;
        
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;

        # Standard timeouts
        proxy_connect_timeout 60s;
        proxy_send_timeout 60s;
        proxy_read_timeout 60s;

        # Debug header
        add_header X-Nginx-Target $backend_url always;
    }

    error_page 500 502 503 504 /50x.html;
    location = /50x.html {
        root /usr/share/nginx/html;
    }
}
