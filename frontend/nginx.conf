server {
    listen 80;

    location / {
        root /usr/share/nginx/html;
        index index.html index.htm;
        try_files $uri $uri/ /index.html;
    }

    # Proxy API requests to the backend
    location /api/ {
        resolver 8.8.8.8 valid=30s;
        
        # Use an environment variable for the backend service URL
        set $backend_url "${RAILWAY_BACKEND_URL}";
        
        # Default fallback if variable is missing
        if ($backend_url = "") {
            set $backend_url "back-end.railway.internal:8000";
        }

        # Protocol detection: If it contains "://", use it as is; otherwise, prepend "https://"
        # This prevents 301 redirects from Railway's edge
        set $proxy_target "";
        if ($backend_url ~* "^https?://") {
            set $proxy_target $backend_url;
        }
        if ($backend_url !~* "^https?://") {
            set $proxy_target "https://$backend_url";
        }

        proxy_pass $proxy_target;
        proxy_http_version 1.1;
        
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection 'upgrade';
        
        # Use a regex to extract the host if protocol is present
        set $proxy_host_header $backend_url;
        if ($backend_url ~* "^https?://([^/]+)") {
            set $proxy_host_header $1;
        }
        proxy_set_header Host $proxy_host_header;
        
        proxy_cache_bypass $http_upgrade;
        
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;

        # Timeouts
        proxy_connect_timeout 60s;
        proxy_send_timeout 60s;
        proxy_read_timeout 60s;

        # SSL support for proxying to HTTPS
        proxy_ssl_server_name on;
        proxy_ssl_verify off; # Railway uses self-signed or internal certificates sometimes

        # Debug headers
        add_header X-Nginx-Target $proxy_target always;
        add_header X-Nginx-Host $proxy_host_header always;
    }

    error_page 500 502 503 504 /50x.html;
    location = /50x.html {
        root /usr/share/nginx/html;
    }
}
