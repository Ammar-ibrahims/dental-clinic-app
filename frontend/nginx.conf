server {
    listen 80;

    # Increase logging for debugging
    error_log /var/log/nginx/error.log debug;
    access_log /var/log/nginx/access.log;

    location / {
        root /usr/share/nginx/html;
        index index.html index.htm;
        try_files $uri $uri/ /index.html;
    }

    # Proxy API requests to the backend
    location /api/ {
        resolver 127.0.0.11 valid=30s; # Docker/Railway internal DNS resolver
        
        # Use a variable for proxy_pass to avoid startup crash if backend is down
        # Try both the short name and the .railway.internal name
        set $upstream http://back-end:8000;
        
        # Proper headers for Railway internal proxying
        proxy_pass $upstream;
        proxy_http_version 1.1;
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection 'upgrade';
        proxy_set_header Host $host;
        proxy_cache_bypass $http_upgrade;
        
        # Robust headers
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_set_header X-Forwarded-Host $host;

        # Debug header to see what Nginx is using
        add_header X-Nginx-Proxy "back-end-internal" always;
    }

    # Error handling
    error_page 502 503 504 /50x.html;
    location = /50x.html {
        root /usr/share/nginx/html;
    }
}
