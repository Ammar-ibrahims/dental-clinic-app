server {
    listen 80;

    location / {
        root /usr/share/nginx/html;
        index index.html index.htm;
        # This tells Nginx to let React handle the routing
        try_files $uri $uri/ /index.html;
    }

    # Proxy API requests to the backend
    location /api/ {
        resolver 8.8.8.8 valid=30s;
        
        # Try Railway Internal Networking FIRST (Service name "back end" becomes "back-end")
        set $upstream_endpoint http://back-end:8000;
        
        # Override with environment variable if provided
        if ("${BACKEND_URL}" != "") {
            set $upstream_endpoint ${BACKEND_URL};
        }
        
        proxy_pass $upstream_endpoint;
        
        # Headers
        proxy_set_header Host $proxy_host; # Use the internal hostname
        if ("${BACKEND_HOST}" != "") {
            proxy_set_header Host ${BACKEND_HOST};
        }
        
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        
        proxy_ssl_server_name on;
        proxy_ssl_verify off;
        
        # Debug header
        add_header X-Proxy-Target $upstream_endpoint always;
    }
}
