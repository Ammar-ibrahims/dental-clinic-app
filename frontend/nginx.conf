server {
    # Railway provides the PORT environment variable
    listen ${PORT};

    location / {
        root /usr/share/nginx/html;
        index index.html index.htm;
        try_files $uri $uri/ /index.html;
    }

    # Proxy API requests to the backend
    location /api/ {
        resolver 127.0.0.11 valid=30s;
        
        # Use Internal Networking (Most reliable on Railway)
        # We try 'back-end' first, then fallback to public URL if provided
        set $p_target "http://back-end:8000";
        
        if ("${RAILWAY_BACKEND_URL}" != "") {
            set $p_target "${RAILWAY_BACKEND_URL}";
        }

        # Protocol Guard
        if ($p_target !~ "^https?://") {
            set $p_target "http://$p_target";
        }

        proxy_pass $p_target;
        proxy_http_version 1.1;
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection 'upgrade';
        
        # Proper Host header for routing
        set $p_host "back-end";
        if ($p_target ~* "^https?://([^/]+)") {
            set $p_host $1;
        }
        proxy_set_header Host $p_host;

        proxy_cache_bypass $http_upgrade;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;

        # Safety timeouts
        proxy_connect_timeout 15s;
        proxy_send_timeout 15s;
        proxy_read_timeout 15s;

        # Debug headers
        add_header X-Nginx-Port ${PORT} always;
        add_header X-Nginx-Target $p_target always;
    }

    error_page 500 502 503 504 /50x.html;
    location = /50x.html {
        root /usr/share/nginx/html;
    }
}
