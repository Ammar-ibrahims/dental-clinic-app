server {
    listen 80;

    location / {
        root /usr/share/nginx/html;
        index index.html index.htm;
        # This tells Nginx to let React handle the routing
        try_files $uri $uri/ /index.html;
    }

    # Proxy API requests to the backend
    location /api/ {
        # Use a variable for proxy_pass to prevent Nginx from crashing if backend is down
        resolver 8.8.8.8;
        set $backend_url https://dental-clinic-app-production.up.railway.app; 
        proxy_pass $backend_url;
        proxy_ssl_server_name on;
        proxy_http_version 1.1;
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection 'upgrade';
        proxy_set_header Host dental-clinic-app-production.up.railway.app;
        proxy_cache_bypass $http_upgrade;
    }
}
