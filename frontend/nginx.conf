server {
    listen 80;

    location / {
        root /usr/share/nginx/html;
        index index.html index.htm;
        try_files $uri $uri/ /index.html;
    }

    # Proxy API requests to the backend
    location /api/ {
        # Railway Internal DNS Resolver
        resolver 127.0.0.11 valid=30s;
        
        # Use a variable for proxy_pass to avoid startup crash
        # This placeholder will be replaced by envsubst
        set $backend_url "${RAILWAY_BACKEND_URL}";
        
        # Default to internal name if variable is empty or placeholder
        if ($backend_url = "") {
            set $backend_url "back-end.railway.internal:8000";
        }

        # Protocol detection: Ensure it starts with http/https
        set $proxy_target $backend_url;
        if ($proxy_target !~ "^https?://") {
            set $proxy_target "http://$proxy_target";
        }

        proxy_pass $proxy_target;
        proxy_http_version 1.1;
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection 'upgrade';

        # Standard Host header logic
        set $p_host "back-end";
        if ($proxy_target ~* "^https?://([^/]+)") {
            set $p_host $1;
        }
        proxy_set_header Host $p_host;

        proxy_cache_bypass $http_upgrade;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;

        # Safety timeouts
        proxy_connect_timeout 15s;
        proxy_send_timeout 15s;
        proxy_read_timeout 15s;

        # SSL support for public URLs
        proxy_ssl_server_name on;
        proxy_ssl_verify off;

        # Debug headers
        add_header X-Nginx-Version "v5-fixed-syntax" always;
        add_header X-Nginx-Target $proxy_target always;
    }

    error_page 500 502 503 504 /50x.html;
    location = /50x.html {
        root /usr/share/nginx/html;
    }
}
