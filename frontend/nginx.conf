server {
    # Listen on dynamic PORT - This is the most critical for Railway
    listen ${PORT};

    location / {
        root /usr/share/nginx/html;
        index index.html index.htm;
        try_files $uri $uri/ /index.html;
    }

    # Proxy API requests to the backend
    location /api/ {
        # Using variable for proxy_pass is the only way to avoid 
        # startup crashes if the internal host is not yet resolvable.
        resolver 127.0.0.11 valid=30s;
        
        # We try the standard Railway internal slug first
        set $backend "http://back-end:8000";
        
        proxy_pass $backend;
        proxy_http_version 1.1;
        
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection 'upgrade';
        proxy_set_header Host $host;
        proxy_cache_bypass $http_upgrade;
        
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;

        # Connection safety
        proxy_connect_timeout 15s;
        proxy_send_timeout 15s;
        proxy_read_timeout 15s;

        # Debug header
        add_header X-Nginx-Status "v8-zero-failure" always;
    }

    error_page 500 502 503 504 /50x.html;
    location = /50x.html {
        root /usr/share/nginx/html;
    }
}
