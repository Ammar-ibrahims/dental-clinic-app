# Handle multiple potential Railway service names and ports
upstream backend_api {
    # Try slugified name from dashboard
    server back-end:8000 max_fails=3 fail_timeout=30s;
    # Try service name from docker-compose.yml
    server backend:8000 max_fails=3 fail_timeout=30s;
    # Try port 5000 just in case
    server back-end:5000 max_fails=3 fail_timeout=30s;
}

server {
    listen 80;

    location / {
        root /usr/share/nginx/html;
        index index.html index.htm;
        try_files $uri $uri/ /index.html;
    }

    # Proxy API requests to the backend
    location /api/ {
        # We use variables to force dynamic resolution if the cluster is slow to start
        resolver 127.0.0.11 valid=30s;
        set $upstream_target "http://backend_api";

        proxy_pass $upstream_target;
        proxy_http_version 1.1;
        
        # Failover: if one internal host fails, try the next one in the upstream block
        proxy_next_upstream error timeout invalid_header http_500 http_502 http_503 http_504;
        
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection 'upgrade';
        proxy_set_header Host $host; 
        proxy_cache_bypass $http_upgrade;
        
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;

        # Standard timeouts
        proxy_connect_timeout 15s;
        proxy_send_timeout 15s;
        proxy_read_timeout 15s;

        # Debug header
        add_header X-Nginx-Cluster "Shotgun-v6" always;
    }

    error_page 500 502 503 504 /50x.html;
    location = /50x.html {
        root /usr/share/nginx/html;
    }
}
