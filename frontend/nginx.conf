server {
    listen 80;

    location / {
        root /usr/share/nginx/html;
        index index.html index.htm;
        try_files $uri $uri/ /index.html;
    }

    # Proxy API requests to the backend
    location /api/ {
        # Railway Internal DNS Resolver (CRITICAL for .internal names)
        resolver 127.0.0.11 valid=30s;
        
        # We try to use the most reliable internal name first
        set $backend_target "http://back-end.railway.internal:8000";

        # If you provided a custom URL in Railway Variables, we use that instead
        if ("${RAILWAY_BACKEND_URL}" != "") {
            set $backend_target "${RAILWAY_BACKEND_URL}";
        }

        # Handle Protocol: Ensure it starts with http/https
        if ($backend_target !~ "^https?://") {
            set $backend_target "http://$backend_target";
        }

        proxy_pass $backend_target;
        proxy_http_version 1.1;
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection 'upgrade';

        # Extract Host header for proper routing on Railway's edge
        set $p_host "back-end";
        if ($backend_target ~* "^https?://([^/]+)") {
            set $p_host $1;
        }
        proxy_set_header Host $p_host;

        proxy_cache_bypass $http_upgrade;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;

        # Safety timeouts
        proxy_connect_timeout 15s;
        proxy_send_timeout 15s;
        proxy_read_timeout 15s;

        # SSL support just in case using public URL
        proxy_ssl_server_name on;
        proxy_ssl_verify off;

        # Debug headers
        add_header X-Nginx-Target $backend_target always;
        add_header X-Nginx-Resolved-Host $p_host always;
    }

    error_page 500 502 503 504 /50x.html;
    location = /50x.html {
        root /usr/share/nginx/html;
    }
}
